version: "2"
run:
  concurrency: 4
  go: "1.25"
  tests: false
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - asciicheck
    - dupl
    - errcheck
    - funlen
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - nolintlint
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unused
    - whitespace
  settings:
    depguard:
      rules:
        deny_deprecated:
          deny:
            - pkg: io/ioutil
              desc: io/ioutil is deprecated, use io and os packages instead
        core-no-runtime-no-adapters:
          list-mode: lax
          files:
            - "**/pkg/**/*.go"
            - "**/internal/**/*.go"
            - "**/cmd/**/*.go"
          deny:
            - pkg: "github.com/dr-dobermann/gobpm/runtime"
              desc: "core MUST NOT import runtime (ADR-003 §4.4)"
            - pkg: "github.com/dr-dobermann/gobpm/adapters"
              desc: "core MUST NOT import adapters (ADR-003 §4.4)"
        examples-no-internal:
          files:
            - "**/examples/**/*.go"
          deny:
            - pkg: "github.com/dr-dobermann/gobpm/internal"
              desc: "examples demonstrate public API only (ADR-003 §4.4)"
        model-no-internal:
          files:
            - "**/pkg/model/**/*.go"
          deny:
            - pkg: "github.com/dr-dobermann/gobpm/internal"
              desc: "pkg/model is the public modeling API; it MUST NOT import internal (ADR-012, ADR-003 §4.4)"
        adapters-no-cross-adapter:
          files:
            - "**/adapters/**/*.go"
          deny:
            - pkg: "github.com/dr-dobermann/gobpm/adapters"
              desc: "adapters MUST NOT import other adapters (ADR-003 §4.4); user composes shared resources at construction time"
    funlen:
      lines: 100
      statements: 50
    gocritic:
      disabled-checks:
        - ruleguard
        - unnamedResult
        - whyNoLint
        - commentedOutCode
        - hugeParam
      enabled-tags:
        - diagnostic
        - performance
        - experimental
        - opinionated
    gocyclo:
      min-complexity: 15
    govet:
      enable:
        - shadow
        - atomic
        - bools
        - buildtag
        - cgocall
        - composites
        - copylocks
        - deepequalerrors
        - errorsas
        - fieldalignment
        - findcall
        - framepointer
        - httpresponse
        - ifaceassert
        - loopclosure
        - lostcancel
        - nilfunc
        - nilness
        - printf
        - reflectvaluecompare
        - shift
        - sigchanyzer
        - sortslice
        - stdmethods
        - stringintconv
        - structtag
        - testinggoroutine
        - tests
        - unmarshal
        - unreachable
        - unsafeptr
        - unusedresult
    lll:
      line-length: 120
    misspell:
      locale: US
    nestif:
      min-complexity: 4
    staticcheck:
      checks:
        - all
  exclusions:
    presets: []
    rules:
      - linters:
          - lll
        source: '^//go:generate '
    paths:
      - generated
      - .generated
      - examples
      - third_party
      - builtin
      - mock_.*\.go$
      - .*\.pb\.go$
      - .*_mock\.go$
      - _test\.go
output:
  formats:
    text:
      path: stdout
