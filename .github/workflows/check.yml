name: check
on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Actions pinned to a commit SHA (not a moving major tag) for a
      # reproducible supply-chain; the trailing comment names the release so
      # dependabot (github-actions ecosystem) can bump SHA + comment together.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so the diff-coverage gate can resolve the merge-base
          # with the base branch (base...HEAD).
          fetch-depth: 0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          # Pinned to the exact patch the go.mod `toolchain` directive
          # requires, so CI and local runs scan the identical stdlib. A
          # bare '1.25' resolved to whatever patch the runner happened to
          # cache, drifting from local results (govulncheck reports stdlib
          # vulns per toolchain patch).
          go-version: '1.25.12'
          cache: true

      # Tool installation — pinned versions, CI-specific (not in Makefile to keep
      # Makefile local-friendly without forcing version installs).
      - name: Install tools
        run: |
          go install github.com/vektra/mockery/v3@v3.5.0
          # install.sh fetched from the PINNED version tag, not master, so the
          # installer script itself is immutable (reproducible supply-chain).
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.11.4/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.11.4
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          go install github.com/dr-dobermann/covercheck/cmd/covercheck@v0.2.0

      # All subsequent checks call into Makefile targets so that running
      # `make ci` locally matches what CI runs. This is the project's
      # "no local/CI drift" rule (see Makefile ci umbrella target).

      # The mocks are committed (FIX-023); this fails if they drift from the
      # interfaces (a changed interface not regenerated + committed).
      - name: Verify committed mocks are current
        run: make mock-check

      - name: Verify all modules tidy
        run: make tidy-check-all

      - name: Lint all modules (ADR-003 import-direction rules enforced)
        run: make lint-all-modules

      - name: Build all modules
        run: make build-all

      # Library-consumption guard (FIX-024): an external module must build
      # against gobpm with no test-only (testify) / mock dep leak.
      - name: Consumer-consumption smoke
        run: make consumer-smoke

      - name: Test all modules with race detector
        run: make test-all

      # Diff-coverage gate (SRD-002): reuses the coverage.txt that test-all just
      # wrote (no second test run); same `make cover-check` / COVER_MIN the
      # local `make ci` uses, so the verdict is identical local and on CI.
      - name: Diff-coverage gate (changed lines >= COVER_MIN)
        run: |
          git fetch --no-tags origin master
          make cover-check COVER_BASE=origin/master

      - name: Vulnerability scan (core)
        run: make vuln

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
